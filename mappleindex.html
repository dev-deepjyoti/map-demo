<html>
<head>
    <title>Mapple - Default Map</title>
    <meta name="viewport" content="initial-scale=1.0">
    <meta charset="utf-8">
    <style>
        html,
        body,
        #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 500px;
        }
    </style>
    <script
        src="https://sdk.mappls.com/map/sdk/web?v=3.0&access_token=frhibvtklfeaugvhceigifzarpjstrvqpvxb&callback=initMap1"
        defer async></script>
</head>

<body>
        <input type="text" id="from" placeholder="From location">
        <input type="text" id="to" placeholder="To location">
        <button onclick="clearAll()">Clear</button>
        <h3 id="info"></h3>
        <div id="map"></div>

    <script>
        let map;
        function initMap1() {
            map = new mappls.Map('map', {
                center: [22.5726, 88.3639],
                zoomControl: true,
                tilt: 60
            });
        }
    </script>
</body>
</html>
