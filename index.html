<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mappls Place Search (From/To)</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; padding: 16px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
      .field { width: 360px; }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      input[type="text"] {
        width: 320px; padding: 10px;
        border: 1px solid #ddd; border-radius: 8px; outline: none;
      }
      .result {
        margin-top: 10px; padding: 10px;
        border: 1px solid #eee; border-radius: 8px; background: #fafafa;
      }
      .result-block { margin: 6px 0; }
      .result-coords { margin-top: 4px; }
      .result b { display: inline-block; min-width: 52px; }

      /* Hidden map — needed by SDK but never shown */
      #hiddenMap {
        width: 1px; height: 1px;
        position: absolute; top: -9999px; left: -9999px;
        visibility: hidden; overflow: hidden;
      }
    </style>
  </head>
  <body>

    <h2>From / To Place Search</h2>

    <div class="row" style="margin-top: 12px">
      <div class="field">
        <label for="fromInput">From</label>
        <input id="fromInput" type="text" placeholder="Start Location..." />
        <input type="hidden" id="fromELoc" />
      </div>
      <div class="field">
        <label for="toInput">To</label>
        <input id="toInput" type="text" placeholder="End Location..." />
        <input type="hidden" id="toELoc" />
      </div>
    </div>

    <div class="result" style="margin-top: 12px">
      <div class="result-block">
        <div><b>FROM:</b> <span id="fromAddress">-</span></div>
        <div class="result-coords">
          Latitude: <span id="fromLat">-</span> ||
          Longitude: <span id="fromLng">-</span>
        </div>
      </div>
      <div class="result-block">
        <div><b>TO:</b> <span id="toAddress">-</span></div>
        <div class="result-coords">
          Latitude: <span id="toLat">-</span> ||
          Longitude: <span id="toLng">-</span>
        </div>
      </div>
    </div>

    <!-- Hidden map container -->
    <div id="hiddenMap"></div>

    <!-- Map SDK — triggers initMap callback once loaded -->
    <script src="https://sdk.mappls.com/map/sdk/web?v=3.0&access_token=frhibvtklfeaugvhceigifzarpjstrvqpvxb&callback=initMap"></script>
    <!-- Plugins SDK — search + getPinDetails -->
    <script src="https://sdk.mappls.com/map/sdk/plugins?access_token=frhibvtklfeaugvhceigifzarpjstrvqpvxb&v=3.0&libraries=search,getPinDetails"></script>

    <script>
      var map;

      /* ─── 1. Init hidden map ─────────────────────────────────────── */
      function initMap() {
        map = new mappls.Map('hiddenMap', {
          center: [20.5937, 78.9629],
          zoom: 5
        });

        map.addListener('load', initSearchBoxes);
      }

      /* ─── 2. Resolve eLoc → lat/lng via getPinDetails marker ─────── */
      function resolveLatLng(eLoc, prefix) {
        setCoords(prefix, 'resolving...', 'resolving...');

        mappls.getPinDetails(
          { map: map, pin: eLoc, infoDiv: false },
          function (data) {
            console.log("getPinDetails data:", data);
            console.log("marker keys:", data?.marker ? Object.keys(data.marker) : 'no marker');

            if (!data?.marker) {
              setCoords(prefix, 'N/A', 'N/A');
              return;
            }

            // Try getLngLat() on marker.obj (MapLibre inner marker)
            // then on marker directly, then fall back to _lngLat
            var lngLat =
              (typeof data.marker.obj?.getLngLat === 'function' && data.marker.obj.getLngLat()) ||
              (typeof data.marker.getLngLat     === 'function' && data.marker.getLngLat())     ||
              data.marker.obj?._lngLat ||
              null;

//The Mappls SDK is built on top of MapLibre GL JS (an open-source map rendering engine). 
// MapLibre has a Marker class with a getLngLat() method that is part of MapLibre's own API — 
// not Mappls's. Mappls wraps it but doesn't document the underlying methods because
//  they consider it an implementation detail.

            console.log("lngLat:", lngLat);
            setCoords(
              prefix,
              lngLat?.lat ?? 'N/A',
              lngLat?.lng ?? 'N/A'
            );
          }
        );
      }

      /* ─── 3. Init search boxes (called after map load) ───────────── */
      function initSearchBoxes() {
        function makeOptions(prefix) {
          return {
            region: 'IND',
            geolocation: true,
            width: 320,
            height: 300,
            clearButton: true,
            blank_callback: function () {
              resetField(prefix);
            }
          };
        }

        function onSearchResult(prefix, data) {
          if (!data) return;
          var dt = Array.isArray(data) ? data[0] : data;
          if (!dt) return;

          var eLoc = dt.eLoc || '';
          var label = dt.placeName
            ? dt.placeName + (dt.placeAddress ? ', ' + dt.placeAddress : '')
            : dt.placeAddress || '';

          document.getElementById(prefix + 'ELoc').value          = eLoc;
          document.getElementById(prefix + 'Address').textContent = label || 'Selected.';

          if (eLoc) resolveLatLng(eLoc, prefix);
        }

        new mappls.search(
          document.getElementById('fromInput'),
          makeOptions('from'),
          function (data) { onSearchResult('from', data); }
        );

        new mappls.search(
          document.getElementById('toInput'),
          makeOptions('to'),
          function (data) { onSearchResult('to', data); }
        );
      }

      /* ─── Helpers ────────────────────────────────────────────────── */
      function setCoords(prefix, lat, lng) {
        document.getElementById(prefix + 'Lat').textContent = lat;
        document.getElementById(prefix + 'Lng').textContent = lng;
      }

      function resetField(prefix) {
        document.getElementById(prefix + 'ELoc').value          = '';
        document.getElementById(prefix + 'Address').textContent = '-';
        setCoords(prefix, '-', '-');
      }
    </script>

  </body>
</html>
