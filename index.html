<!DOCTYPE html>
<html>

<head>
    <title>Mappls Direction - Multi Route चयन</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ Map SDK -->
    <script
        src="https://sdk.mappls.com/map/sdk/web?v=3.0&access_token=frhibvtklfeaugvhceigifzarpjstrvqpvxb&callback=initMap"></script>

    <!-- ✅ Direction Plugin -->
    <script
        src="https://sdk.mappls.com/map/sdk/plugins?access_token=frhibvtklfeaugvhceigifzarpjstrvqpvxb&v=3.0"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        #map {
            width: 100%;
            height: 60vh;
        }

        .controls {
            padding: 10px;
            background: #f5f5f5;
        }

        input,
        select {
            margin: 5px;
            padding: 6px;
        }

        #info {
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="controls">
        <input type="text" id="from" placeholder="Start location"> 
        <input type="text" id="to" placeholder="End location">

        <select id="vehicle">
            <option value="driving">Car</option>
            <option value="biking">Bike</option>
            <option value="trucking">Truck</option>
            <option value="walking">Walking</option>
        </select>

        <!-- 🔥 Route selector -->
        <select id="routeSelect" onchange="onRouteChange()">
            <option value="">Select Route</option>
        </select>

        <button onclick="getRoute()">Get Route</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <div id="map"></div>
    <div id="info"></div>

    <script>

        let map, direction_plugin;
        let allRoutes = [];

        // ✅ INIT MAP
        function initMap() {
            map = new mappls.Map('map', {
                center: [22.5726, 88.3639],
                zoom: 10
            });
        }

        //  GET ROUTE
        function getRoute() {

            let from = document.getElementById("from").value;
            let to = document.getElementById("to").value;
            let vehicle = document.getElementById("vehicle").value;

            if (!from || !to) {
                alert("Enter both locations");
                return;
            }

            // remove old route
            if (direction_plugin) {
                direction_plugin.remove();
            }

            let options = {
                map: map,
                start: from,
                end: to,
                Profile: [vehicle],
                isDraggable: false
            };

            mappls.direction(options, function (data) {

                direction_plugin = data;

                let routes = data?.routes || data?.data?.routes;

                if (!routes || routes.length === 0) {
                    document.getElementById("info").innerHTML = "No route found";
                    return;
                }

                // 🔥 store routes
                allRoutes = routes;

                // 🔽 populate dropdown
                let dropdown = document.getElementById("routeSelect");
                dropdown.innerHTML = '<option value="">Select Route</option>';

                console.log("Data:"+data);
                console.log("All Route:"+allRoutes);

                routes.forEach((r, index) => {
                    let dist = (r.distance / 1000).toFixed(2);
                    let dur = (r.duration / 60).toFixed(0);

                    dropdown.innerHTML += `<option value="${index}">
                        Route ${index + 1} (${dist} km, ${dur} mins)
                    </option>`;
                });

                // auto select first route
                dropdown.value = 0;
                showRouteDetails(0);
            });
        }

        // 🔄 Route selection change
        function onRouteChange() {
            let index = document.getElementById("routeSelect").value;

            if (index !== "") {
                showRouteDetails(index);
            }
        }

        // 📊 Show route details
        function showRouteDetails(index) {

            let route = allRoutes[index];

            let distance = (route.distance / 1000).toFixed(2);
            let duration = (route.duration / 60).toFixed(0);

            let start = route.legs[0].start_location;
            let end = route.legs[0].end_location;

            let startAddr = route.legs[0].start_address;
            let endAddr = route.legs[0].end_address;

            document.getElementById("info").innerHTML = `
                <b>From:</b> ${startAddr} <br>
                <b>To:</b> ${endAddr} <br><br>

                <b>Distance:</b> ${distance} km <br>
                <b>ETA:</b> ${duration} mins <br><br>

                <b>From Lat/Lng:</b> ${start.lat}, ${start.lng} <br>
                <b>To Lat/Lng:</b> ${end.lat}, ${end.lng}
            `;
        }

        // CLEAR CONTROLS
        function clearAll() {

            document.getElementById("from").value = "";
            document.getElementById("to").value = "";
            document.getElementById("info").innerHTML = "";

            document.getElementById("routeSelect").innerHTML = '<option value="">Select Route</option>';
            allRoutes = [];

            if (direction_plugin) {
                direction_plugin.remove();
            }

            map.setCenter([22.5726, 88.3639]);
            map.setZoom(10);
        }
    </script>
</body>

</html>
