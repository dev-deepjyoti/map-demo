<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mappls Place Search (From/To)</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        padding: 16px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: flex-start;
      }
      .field {
        width: 360px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input[type="text"] {
        width: 320px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
      }
      .result {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid #eee;
        border-radius: 8px;
        background: #fafafa;
      }
      .result-block {
        margin: 6px 0;
      }
      .result-coords {
        margin-top: 4px;
      }
      .result b {
        display: inline-block;
        min-width: 52px;
      }
      .muted {
        color: #666;
        font-size: 12px;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h2>From / To Place Search</h2>
    <div class="row" style="margin-top: 12px">
      <div class="field">
        <label for="fromInput">From</label>
        <input id="fromInput" type="text" placeholder="Start Location..." />
        <input type="hidden" id="fromELoc" />
      </div>

      <div class="field">
        <label for="toInput">To</label>
        <input id="toInput" type="text" placeholder="End Location..." />
        <input type="hidden" id="toELoc" />
      </div>
    </div>

    <div class="result" id="result" style="margin-top: 12px">
      <div class="result-block">
        <div><b>FROM:</b> <span id="fromAddress">-</span></div>
        <div class="result-coords">
          Latitude: <span id="fromLat">-</span> || Longitude: <span id="fromLng">-</span>
        </div>
      </div>

      <div class="result-block">
        <div><b>TO:</b> <span id="toAddress">-</span></div>
        <div class="result-coords">
          Latitude: <span id="toLat">-</span> || Longitude: <span id="toLng">-</span>
        </div>
      </div>
    </div>

    <!-- Mappls Place Search plugin -->
    <script
      src="https://sdk.mappls.com/map/sdk/plugins?access_token=frhibvtklfeaugvhceigifzarpjstrvqpvxb&v=3.0&libraries=search"
    ></script>

    <script>
      // Parse Mappls place search callback payload (sample uses dt.eLoc)
      function parseELocToLatLng(eLoc) {
        if (!eLoc) return { lat: null, lng: null };
        if (typeof eLoc !== "string") return { lat: null, lng: null };
        console.log("Function-parseELocToLatLng-eLoc:"+eLoc);

        // Common format is "lat,lng" (used by Mappls pinMarker plugin).
        const parts = eLoc.split(",");
        if (parts.length === 2) {
          const lat = parseFloat(parts[0]);
          const lng = parseFloat(parts[1]);

          console.log("Function-parseELocToLatLng-lat:"+lat);
          console.log("Function-parseELocToLatLng-lng:"+lng);

          if (!Number.isNaN(lat) && !Number.isNaN(lng)) 
          {
              return { lat, lng };
          }
        }
        return { lat: null, lng: null };
      }

      function updateFromUI(prefix, data) {
        if (!data) return;
        console.log("updateFromUI-data:"+JSON.stringify(data));
        // Token/auth error handling (per docs).
        if (!Array.isArray(data) && data.error) {
          console.error("Mappls search error:", data);
          document.getElementById(prefix + "Address").textContent = "Error: " + data.error;
          // Attempt token refresh if SDK supports it.
          if (typeof mappls?.setToken === "function") {
            try {
              mappls.setToken();
            } catch (e) {
              // Ignore; token may require user-side handling.
            }
          }
          return;
        }

        // In Mappls sample, callback receives `data` where `data[0]` holds details.
        const dt = Array.isArray(data) ? data[0] : data;
        if (!dt) return;

        console.log("updateFromUI-dt:"+dt);

        const eLoc = dt.eLoc || "";
        const { lat, lng } = parseELocToLatLng(eLoc);

        document.getElementById(prefix + "ELoc").value = eLoc;
        document.getElementById(prefix + "Lat").textContent =
          lat == null ? "-" : lat;
        document.getElementById(prefix + "Lng").textContent =
          lng == null ? "-" : lng;

        const placeText = dt.placeName
          ? dt.placeName + (dt.placeAddress ? " , " + dt.placeAddress : "")
          : dt.placeAddress
            ? dt.placeAddress
            : "";

        document.getElementById(prefix + "Address").textContent =
          placeText || (eLoc ? "Selected." : "-");
      }

      window.addEventListener("DOMContentLoaded", function () {
        // Place options: location is used as radial bias (not restriction).
        // Adjust the coordinates for your desired default bias center.
        function makePlaceOptions(prefix) {
          return {
          region: "IND",
          geolocation: true,
          // location: [28.61, 77.23],
          width: 320,
          height: 300,
          clearButton: false,
            blank_callback: function () {
              // Clear when user clicks cross button / erases input.
              document.getElementById(prefix + "Lat").textContent = "-";
              document.getElementById(prefix + "Lng").textContent = "-";
              document.getElementById(prefix + "ELoc").value = "";
              document.getElementById(prefix + "Address").textContent = "-";
            },
          };
        }

        // Initialize two independent search boxes.
        new mappls.search(
          document.getElementById("fromInput"),
          makePlaceOptions("from"),
          function (data) {
            updateFromUI("from", data);
            console.log("data from:"+JSON.stringify(data));
          }
        );

        new mappls.search(
          document.getElementById("toInput"),
          makePlaceOptions("to"),
          function (data) {
            updateFromUI("to", data);
            console.log("data To:"+JSON.stringify(data));
          }
        );
      });
    </script>
  </body>
</html>
