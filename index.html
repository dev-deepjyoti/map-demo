<!DOCTYPE html>
<html>
<head>
    <title>Mappls Distance POC</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        #results {
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
        }
        #map {
            height: 300px;
            width: 100%;
            margin-top: 10px;
        }
    </style>
    <script src="https://apis.mappls.com/advancedmaps/api/frhibvtklfeaugvhceigifzarpjstrvqpvxb/map_sdk?v=3.0&layer=vector"></script>
    <script src="https://apis.mappls.com/advancedmaps/api/frhibvtklfeaugvhceigifzarpjstrvqpvxb/map_sdk_plugins?v=3.0"></script>
</head>

<body>

    <div class="container">
        <h2>Mappls Distance Finder</h2>

        <input type="text" id="from-input" placeholder="Enter Starting Location">
        <input type="text" id="to-input" placeholder="Enter Destination">

        <button onclick="getDistance()" style="padding:10px 20px; cursor:pointer;">Show Distance</button>

        <div id="results">
            <p><b>From:</b> <span id="from-coord">N/A</span></p>
            <p><b>To:</b> <span id="to-coord">N/A</span></p>
            <p><b>Road Distance:</b> <span id="dist-val">0</span> km</p>
        </div>

        <div id="map"></div>
    </div>

    <script>
        let fromData, toData, map;

        // 1. Initialize Map
        map = new mappls.Map('map', { center: [28.6139, 77.2090], zoom: 5 });

        // 2. Attach Search (Autosuggest) to Textboxes
        new mappls.search(document.getElementById("from-input"), (data) => {
            fromData = data[0];
            document.getElementById('from-coord').innerText = `${fromData.lat}, ${fromData.lng}`;
        });

        new mappls.search(document.getElementById("to-input"), (data) => {
            toData = data[0];
            document.getElementById('to-coord').innerText = `${toData.lat}, ${toData.lng}`;
        });

        // 3. Calculate Distance
        function getDistance() {
            if (!fromData || !toData) return alert("Please select both locations from the dropdown");

            const url = `https://apis.mappls.com/advancedmaps/v1/frhibvtklfeaugvhceigifzarpjstrvqpvxb/distance_matrix/driving/${fromData.lng},${fromData.lat};${toData.lng},${toData.lat}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    const distInKm = (data.results.distances[0][1] / 1000).toFixed(2);
                    document.getElementById('dist-val').innerText = distInKm;

                    // Optional: Zoom map to show both
                    map.setCenter([fromData.lat, fromData.lng]);
                });
        }
    </script>
</body>

</html>
