<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mappls Place Search (From/To)</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; padding: 16px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
      .field { width: 360px; }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      input[type="text"] { width: 320px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
      .result { margin-top: 10px; padding: 10px; border: 1px solid #eee; border-radius: 8px; background: #fafafa; }
      .result-block { margin: 6px 0; }
      .result-coords { margin-top: 4px; }
      .result b { display: inline-block; min-width: 52px; }
    </style>
  </head>
  <body>
    <h2>From / To Place Search</h2>

    <div class="row" style="margin-top: 12px">
      <div class="field">
        <label for="fromInput">From</label>
        <input id="fromInput" type="text" placeholder="Start Location..." />
        <input type="hidden" id="fromELoc" />
      </div>
      <div class="field">
        <label for="toInput">To</label>
        <input id="toInput" type="text" placeholder="End Location..." />
        <input type="hidden" id="toELoc" />
      </div>
    </div>

    <div class="result" id="result" style="margin-top: 12px">
      <div class="result-block">
        <div><b>FROM:</b> <span id="fromAddress">-</span></div>
        <div class="result-coords">
          Latitude: <span id="fromLat">-</span> || Longitude: <span id="fromLng">-</span>
        </div>
      </div>
      <div class="result-block">
        <div><b>TO:</b> <span id="toAddress">-</span></div>
        <div class="result-coords">
          Latitude: <span id="toLat">-</span> || Longitude: <span id="toLng">-</span>
        </div>
      </div>
    </div>

    <!--
      Single plugins script with BOTH libraries loaded:
      - search      → mappls.search()
      - getPinDetails → mappls.getPinDetails()
    -->
    <script src="https://sdk.mappls.com/map/sdk/plugins?access_token=frhibvtklfeaugvhceigifzarpjstrvqpvxb&v=3.0&libraries=search,getPinDetails"></script>

    <script>
      // ✅ Resolve eLoc → lat/lng using getPinDetails (no map needed)
      function resolveLatLng(eLoc, prefix) {
        document.getElementById(prefix + 'Lat').textContent = 'resolving...';
        document.getElementById(prefix + 'Lng').textContent = 'resolving...';

        mappls.getPinDetails(
          { pin: eLoc },         // ✅ map is optional — skip it entirely
          function (data) {
            console.log("getPinDetails raw:", data);

            if (!data) return;

            // Response is typically the place detail object directly
            var d = Array.isArray(data) ? data[0] : data;

            console.log("getPinDetails keys:", Object.keys(d));

            var lat = d?.latitude  ?? d?.lat  ?? null;
            var lng = d?.longitude ?? d?.lng  ?? null;

            console.log("Resolved lat/lng:", lat, lng);

            document.getElementById(prefix + 'Lat').textContent = lat ?? 'N/A';
            document.getElementById(prefix + 'Lng').textContent = lng ?? 'N/A';
          }
        );
      }

      // ✅ Search boxes
      window.addEventListener('DOMContentLoaded', function () {

        function makePlaceOptions(prefix) {
          return {
            region: 'IND',
            geolocation: true,
            width: 320,
            height: 300,
            clearButton: true,
            blank_callback: function () {
              document.getElementById(prefix + 'Lat').textContent     = '-';
              document.getElementById(prefix + 'Lng').textContent     = '-';
              document.getElementById(prefix + 'ELoc').value          = '';
              document.getElementById(prefix + 'Address').textContent = '-';
            },
          };
        }

        function handleSearchResult(prefix, data) {
          if (!data) return;
          const dt = Array.isArray(data) ? data[0] : data;
          if (!dt) return;

          const eLoc = dt.eLoc || '';
          const placeText = dt.placeName
            ? dt.placeName + (dt.placeAddress ? ', ' + dt.placeAddress : '')
            : dt.placeAddress || '';

          document.getElementById(prefix + 'ELoc').value          = eLoc;
          document.getElementById(prefix + 'Address').textContent = placeText || 'Selected.';

          // 🔑 Use getPinDetails to get lat/lng from eLoc
          if (eLoc) resolveLatLng(eLoc, prefix);
        }

        new mappls.search(
          document.getElementById('fromInput'),
          makePlaceOptions('from'),
          function (data) {
            console.log('Search From Data:', JSON.stringify(data));
            handleSearchResult('from', data);
          }
        );

        new mappls.search(
          document.getElementById('toInput'),
          makePlaceOptions('to'),
          function (data) {
            console.log('Search To Data:', JSON.stringify(data));
            handleSearchResult('to', data);
          }
        );
      });
    </script>
  </body>
</html>
