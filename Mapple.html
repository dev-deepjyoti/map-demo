<!DOCTYPE html>
<html>
<head>
    <title>Mappls Auto Route (Fixed)</title>
    <!-- ✅ DIRECT SDK LOAD (IMPORTANT) -->
    <script src="https://apis.mappls.com/advancedmaps/api/pioyvgbqeyyzepytajhnpjarhdsyvyjintmc/map_sdk?layer=vector&v=3.0"></script>    
    <style>
        #map { width: 100%; height: 500px; }
        input { margin:5px; padding:5px; }
        button { padding:5px 10px; }
    </style>
</head>
<body>

<input type="text" id="from" placeholder="From location">
<input type="text" id="to" placeholder="To location">
<button onclick="clearAll()">Clear</button>

<h3 id="info"></h3>

<div id="map"></div>

<script>

let map;
let routeLine = null;
let debounceTimer = null;

// ✅ INIT MAP AFTER PAGE LOAD
window.onload = function () {

    if (typeof mappls === "undefined") {
        alert("Mappls SDK not loaded. Check API Key / Domain.");
        return;
    }

    map = new mappls.Map('map', {
        center: [22.5726, 88.3639],
        zoom: 12
    });
};

// 🔍 Geocode
function geocode(query, callback) {
    fetch(`https://apis.mappls.com/advancedmaps/v1/pioyvgbqeyyzepytajhnpjarhdsyvyjintmc/geo_code?address=${encodeURIComponent(query)}`)
        .then(res => res.json())
        .then(data => {
            if (data.results && data.results.length > 0) {
                let loc = data.results[0].location;
                callback({ lat: loc.lat, lng: loc.lng });
            }
        })
        .catch(err => console.error("Geocode error:", err));
}

// 🚗 Route
function calculateRoute() {

    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    if (!from || !to) return;

    geocode(from, function(fromPos) {
        geocode(to, function(toPos) {

            fetch(`https://apis.mappls.com/advancedmaps/v1/pioyvgbqeyyzepytajhnpjarhdsyvyjintmc/route_adv/driving/${fromPos.lng},${fromPos.lat};${toPos.lng},${toPos.lat}`)
                .then(res => res.json())
                .then(data => {

                    if (!data.routes || data.routes.length === 0) {
                        alert("Route not found");
                        return;
                    }

                    if (routeLine) {
                        map.removeLayer(routeLine);
                    }

                    let coords = data.routes[0].geometry.coordinates;

                    routeLine = new mappls.Polyline({
                        map: map,
                        path: coords.map(c => [c[1], c[0]]),
                        strokeColor: 'blue',
                        strokeWidth: 5
                    });

                    map.fitBounds(routeLine.getBounds());

                    let distance = data.routes[0].distance / 1000;
                    let duration = data.routes[0].duration / 60;

                    document.getElementById("info").innerHTML =
                        `Distance: ${distance.toFixed(2)} km | ETA: ${duration.toFixed(0)} mins`;

                })
                .catch(err => console.error("Route error:", err));

        });
    });
}

// ⚡ Debounce typing
function handleTyping() {
    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(() => {
        calculateRoute();
    }, 600);
}

// 🎯 Events
document.getElementById("from").addEventListener("keyup", handleTyping);
document.getElementById("to").addEventListener("keyup", handleTyping);

// 🧹 Clear
function clearAll() {

    document.getElementById("from").value = "";
    document.getElementById("to").value = "";
    document.getElementById("info").innerHTML = "";

    if (routeLine) {
        map.removeLayer(routeLine);
        routeLine = null;
    }

    map.setCenter([22.5726, 88.3639]);
    map.setZoom(12);
}

</script>

</body>
</html>
