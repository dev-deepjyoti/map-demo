<!DOCTYPE html>
<html>
<head>
    <title>Open Street View map - Distance Calculation</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        #map {
            height: 500px;
        }
    </style>
</head>
<body>

<h3>Click map to select From and To location</h3>
<div id="map"></div>

<script>
    // Initialize map (Kolkata default)
    var map = L.map('map').setView([22.5726, 88.3639], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    let from = null;
    let to = null;

    let fromMarker, toMarker, routeLine;

    map.on('click', function (e) {
        let lat = e.latlng.lat;
        let lng = e.latlng.lng;

        console.log("Clicked:", lat, lng);

        // First click = FROM
        if (!from) {
            from = { lat, lng };

            fromMarker = L.marker([lat, lng])
                .addTo(map)
                .bindPopup("FROM")
                .openPopup();

            console.log("FROM selected:", from);
        }

        // Second click = TO
        else if (!to) {
            to = { lat, lng };

            toMarker = L.marker([lat, lng])
                .addTo(map)
                .bindPopup("TO")
                .openPopup();

            console.log("TO selected:", to);

            // Draw line
            routeLine = L.polyline([
                [from.lat, from.lng],
                [to.lat, to.lng]
            ]).addTo(map);

            // Calculate distance
            let distance = calculateDistance(from, to);

            console.log("Distance (KM):", distance.toFixed(2));
        }

        // Third click = reset
        else {
            resetMap();

            from = { lat, lng };

            fromMarker = L.marker([lat, lng])
                .addTo(map)
                .bindPopup("FROM")
                .openPopup();
        }
    });

    // Haversine formula (distance in KM)
    function calculateDistance(p1, p2) {
        const R = 6371; // Earth radius in KM

        const dLat = toRad(p2.lat - p1.lat);
        const dLon = toRad(p2.lng - p1.lng);

        const a =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(toRad(p1.lat)) *
            Math.cos(toRad(p2.lat)) *
            Math.sin(dLon / 2) *
            Math.sin(dLon / 2);

        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return R * c;
    }

    function toRad(value) {
        return value * Math.PI / 180;
    }

    function resetMap() {
        if (fromMarker) map.removeLayer(fromMarker);
        if (toMarker) map.removeLayer(toMarker);
        if (routeLine) map.removeLayer(routeLine);

        from = null;
        to = null;

        console.clear();
    }
</script>

</body>
</html>
